<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O mně - Eliška Kubíková</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #16e930;
            color: #fc03d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #fc03d9;
            margin-bottom: 0.5rem;
        }
        .info-list {
            list-style-type: none;
            padding: 0;
        }
        .info-list li {
            margin: 10px 0;
            padding: 8px;
            background: #f3e5f5;
            border-radius: 8px;
        }
        .emoji {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Eliška Kubíková</h1>
        <p>Vítejte na mé stránce! Tady je pár věcí o mně:</p>
        
        <ul class="info-list">
            <li><span class="emoji">🎵</span> Mám ráda hudbu</li>
            <li><span class="emoji">💃</span> Ráda tancuji</li>
            <li><span class="emoji">🐱</span> Mám kočku jménem <strong>Viki</strong></li>
        </ul>
    </div>

</body>
</html>
